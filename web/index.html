<!DOCTYPE html>
<html lang="fa" dir="rtl" id="html-root">
<head>

    <title>Land of Rust: The Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #f97316;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            overflow-x: hidden;
        }

        html[dir="rtl"] body { font-family: 'Vazirmatn', sans-serif; }
        html[dir="ltr"] body { font-family: 'Nunito', sans-serif; }
        .code-font { font-family: 'JetBrains Mono', monospace !important; }

        /* force LTR for any code-like elements (not needed in index but for consistency) */
        .code-font, pre, code, .terminal-block {
            direction: ltr !important;
            text-align: left !important;
        }

        #star-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .hero-glow {
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(249,115,22,0.3) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; pointer-events: none;
        }

        .ferris-hero {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px rgba(249, 115, 22, 0.6));
            animation: floatHero 4s ease-in-out infinite;
        }

        @keyframes floatHero {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .chapter-card {
            background: var(--card-bg);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .chapter-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: all 0.5s;
        }

        .chapter-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.2);
        }

        .chapter-card:hover::before {
            left: 200%;
        }

        .chapter-num {
            position: absolute;
            top: -15px;
            right: -10px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            transition: color 0.3s;
        }

        html[dir="rtl"] .chapter-num { right: auto; left: 10px; }
        html[dir="ltr"] .chapter-num { right: 10px; left: auto; }

        .chapter-card:hover .chapter-num { color: rgba(249, 115, 22, 0.15); }

        .chapter-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        // Helper: format numbers (for HUD not used in index, but for consistency)
        function formatNumber(num, lang) {
            const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
            const westernDigits = '0123456789';
            let str = num.toString();
            if (lang !== 'fa') {
                return str.replace(/[۰-۹]/g, d => westernDigits[persianDigits.indexOf(d)]);
            } else {
                return str.replace(/[0-9]/g, d => persianDigits[parseInt(d)]);
            }
        }

        // Current language state
        let currentLang = 'fa';

        // Function to build language buttons dynamically
        function buildLanguageButtons() {
            const bar = document.getElementById('language-bar');
            bar.innerHTML = '';
            for (const [code, data] of Object.entries(languagePack)) {
                const btn = document.createElement('button');
                btn.innerText = data.name;
                btn.className = `px-4 md:px-5 py-1.5 rounded-full text-sm font-bold transition-colors ${currentLang === code ? 'bg-orange-500 text-white shadow-[0_0_10px_rgba(249,115,22,0.5)]' : 'text-slate-300 hover:text-white'}`;
                btn.onclick = () => setLang(code);
                bar.appendChild(btn);
            }
        }

        // Render all dynamic content based on current language
        function renderPage() {
            const pack = languagePack[currentLang];
            if (!pack) return;

            // Hero texts
            document.getElementById('hero-title').innerText = pack.heroTitle;
            document.getElementById('hero-subtitle').innerText = pack.heroSubtitle;
            document.getElementById('hero-description').innerHTML = pack.heroDesc;
            document.getElementById('start-btn-text').innerText = pack.startBtn;
            document.getElementById('chapters-heading').innerText = pack.chaptersHeading;
            document.getElementById('footer-text').innerHTML = pack.footer;

            // Chapters grid
            const grid = document.getElementById('chapters-grid');
            let html = '';
            for (let i = 0; i < pack.chapters.length; i++) {
                const ch = pack.chapters[i];
                const icon = chapterIcons[i];
                const chapterNum = i + 1;
                html += `
                    <a href="chapter-${chapterNum}.html" class="chapter-card group">
                        <span class="chapter-num">${formatNumber(chapterNum, currentLang)}</span>
                        <i class="fa-solid ${icon} chapter-icon"></i>
                        <h4 class="text-xl font-bold text-white mb-2 relative z-10">${ch.title}</h4>
                        <p class="text-slate-400 text-sm mt-auto relative z-10 font-bold code-font">${ch.sub}</p>
                    </a>
                `;
            }
            grid.innerHTML = html;
        }

        // Change language and update everything
        function setLang(lang) {
            if (!languagePack[lang]) return;
            currentLang = lang;
            const htmlRoot = document.getElementById('html-root');
            htmlRoot.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
            // Update active button styles
            const btns = document.querySelectorAll('#language-bar button');
            btns.forEach(btn => {
                const btnLang = Object.keys(languagePack).find(k => languagePack[k].name === btn.innerText);
                if (btnLang === lang) {
                    btn.className = "px-4 md:px-5 py-1.5 rounded-full text-sm font-bold transition-colors bg-orange-500 text-white shadow-[0_0_10px_rgba(249,115,22,0.5)]";
                } else {
                    btn.className = "px-4 md:px-5 py-1.5 rounded-full text-sm font-bold transition-colors text-slate-300 hover:text-white";
                }
            });
            renderPage();
        }

        // --- Animated Star Background (unchanged) ---
        function initStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let stars = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                createStars();
            }

            function createStars() {
                stars = [];
                const numStars = Math.floor((width * height) / 2000);
                for (let i = 0; i < numStars; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 1.5,
                        vx: Math.floor(Math.random() * 50) - 25,
                        vy: Math.floor(Math.random() * 50) - 25,
                        opacity: Math.random()
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < stars.length; i++) {
                    let s = stars[i];
                    s.y -= 0.2;
                    if (s.y < 0) s.y = height;
                    s.opacity += (Math.random() - 0.5) * 0.1;
                    if(s.opacity < 0.2) s.opacity = 0.2;
                    if(s.opacity > 1) s.opacity = 1;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, 2 * Math.PI);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            draw();
        }

        // --- Initialization ---
        buildLanguageButtons();
        initStars();
        setLang('fa');  // Start with Persian
