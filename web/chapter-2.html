<!DOCTYPE html>
<html lang="fa" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Land of Rust: Chapter 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #020617; --crt-bg: #0f172a; }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(99, 102, 241, 0.15) 2px, transparent 40px), radial-gradient(rgba(168, 85, 247, 0.1) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            color: white;
            overflow-x: hidden;
        }
        html[dir="rtl"] body { font-family: 'Vazirmatn', sans-serif; }
        html[dir="ltr"] body { font-family: 'Nunito', sans-serif; }
        .code-font { font-family: 'JetBrains Mono', monospace !important; }
        /* force LTR for code blocks */
        .terminal-block, .code-slot, .code-option, .code-font, pre, code, #game-console, #guess-input {
            direction: ltr !important;
            text-align: left !important;
        }
        .dashboard {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border: 4px solid #475569;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .screen-crt {
            background-color: var(--crt-bg);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            border: 4px solid #1e293b;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.5s;
        }
        .screen-crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .dialog-box {
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            border-radius: 15px;
            border: 3px solid #8b5cf6;
            position: relative;
        }
        html[dir="rtl"] .dialog-box::after {
            content: ''; position: absolute; bottom: -15px; right: 40px;
            border-width: 15px 15px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }
        html[dir="ltr"] .dialog-box::after {
            content: ''; position: absolute; bottom: -15px; left: 40px;
            border-width: 15px 15px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }
        .ferris-avatar {
            width: 90px; height: 90px;
            background: #f8fafc; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; border: 4px solid #8b5cf6;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .code-slot {
            display: inline-block; min-width: 70px; height: 30px;
            border-bottom: 3px dashed #fbbf24; margin: 0 5px;
            vertical-align: middle; text-align: center;
            color: #fbbf24; background: rgba(255, 255, 255, 0.1);
            border-radius: 5px; cursor: pointer; transition: all 0.3s;
        }
        .code-slot.filled { border: 2px solid #a855f7; background: rgba(168, 85, 247, 0.2); color: #c084fc; }
        .code-option {
            background: #334155; border: 2px solid #64748b;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; user-select: none;
        }
        .code-option:hover { background: #475569; transform: scale(1.05); }
        .code-option.selected { background: #8b5cf6; border-color: #a855f7; color: white; font-weight: bold; }
        .glitch { animation: glitch-skew 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-4deg); }
            40% { transform: skew(4deg); }
            60% { transform: skew(-2deg); }
            80% { transform: skew(2deg); }
            100% { transform: skew(0deg); }
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .terminal-block {
            background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 640px) {
            .dashboard { padding: 1rem !important; }
            .ferris-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
            .dialog-box { padding: 0.75rem !important; }
            .code-slot { min-width: 55px; font-size: 0.9rem; }
            .code-option { padding: 4px 10px; font-size: 0.9rem; }
        }
        .cursor-blink::after { content: "█"; animation: blink 1s step-start infinite; color: #a855f7; }
        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-4 pb-20">

    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <div class="dashboard w-full max-w-4xl p-4 md:p-8 relative">

        <!-- Dynamic Language Bar -->
        <div class="absolute top-[-20px] left-1/2 transform -translate-x-1/2 bg-slate-800 rounded-full p-1 border border-slate-600 flex shadow-lg gap-1" id="language-bar" dir="ltr"></div>

        <!-- HUD -->
        <div class="flex justify-between items-center mb-6 border-b border-slate-600 pb-4 mt-2">
            <div class="flex gap-4 font-bold text-sm md:text-base" id="hud-stats">
                <div class="text-emerald-400"><i class="fa-solid fa-heart"></i> <span id="hp-label"></span> <span id="hp-value">100%</span></div>
                <div class="text-purple-400"><i class="fa-solid fa-star"></i> <span id="star-label"></span> <span id="star-status" class="text-yellow-300"></span></div>
            </div>
            <div class="text-slate-400 code-font text-xs md:text-sm">RUST-OS v2.0 (Logic Module)</div>
        </div>

        <!-- Dialog Box -->
        <div class="flex flex-col md:flex-row items-end gap-4 mb-8">
            <div class="ferris-avatar shadow-lg z-10 shrink-0">🦀</div>
            <div class="dialog-box p-4 md:p-5 shadow-xl w-full border-purple-500">
                <h3 id="ferris-name" class="font-bold text-purple-600 mb-2"></h3>
                <p id="dialog-text" class="text-base md:text-lg leading-relaxed min-h-[70px] font-bold text-slate-700"></p>
                <div class="mt-3 flex justify-end">
                    <button id="next-dialog-btn" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg font-bold transition text-sm hidden" onclick="nextDialog()">
                        <span id="next-btn-text"></span> <i id="next-icon" class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area" class="hidden fade-in">
            <div id="crt-monitor" class="screen-crt p-4 md:p-6 font-mono text-purple-300 code-font min-h-[400px] flex flex-col">

                <!-- Mission 1: rand crate -->
                <div id="mission-1" class="mission-view flex-grow">
                    <div class="text-center mb-4 border-b border-purple-800 pb-2">
                        <h2 id="mission1-title" class="text-lg md:text-xl font-bold text-white"></h2>
                    </div>
                    <div id="mission1-text" class="leading-relaxed space-y-3 text-sm md:text-base text-slate-300"></div>
                    <div class="mt-8 text-center">
                        <button id="mission1-btn" class="bg-purple-700 hover:bg-purple-600 text-white px-6 py-2 rounded font-bold code-font" onclick="startMission(2)"></button>
                    </div>
                </div>

                <!-- Mission 2: mutability puzzle -->
                <div id="mission-2" class="mission-view hidden flex-grow">
                    <div id="mission2-step" class="text-yellow-400 mb-2 text-sm md:text-base"></div>
                    <div id="mission2-desc" class="text-sm md:text-base text-slate-300 mb-4 space-y-2"></div>
                    <div class="terminal-block text-base md:text-lg mb-4 text-emerald-300">
                        <span class="text-pink-400">let</span> <span id="slot1" class="code-slot" onclick="clearSlot(1)">---</span> guess = String::new();
                    </div>
                    <div id="puzzle1-feedback" class="text-rose-400 h-6 mb-4 text-xs md:text-sm font-bold"></div>
                    <div class="border-t border-purple-900 pt-3">
                        <div class="flex flex-wrap gap-2 justify-center">
                            <div class="code-option code-font" onclick="selectOption(this, 1, 'const')">const</div>
                            <div class="code-option code-font" onclick="selectOption(this, 1, 'mut')">mut</div>
                            <div class="code-option code-font" onclick="selectOption(this, 1, 'var')">var</div>
                            <div class="code-option code-font" onclick="selectOption(this, 1, 'open')">open</div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="run-puzzle1-btn" class="bg-purple-700 hover:bg-purple-600 text-white px-6 py-2 rounded font-bold opacity-50 cursor-not-allowed transition" onclick="checkPuzzle1()" disabled>
                            <span id="puzzle1-btn-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 3: comparison operator puzzle -->
                <div id="mission-3" class="mission-view hidden flex-grow">
                    <div id="mission3-step" class="text-yellow-400 mb-2 text-sm md:text-base"></div>
                    <p id="mission3-desc" class="text-sm md:text-base text-slate-300 mb-4"></p>
                    <div class="terminal-block text-base md:text-lg mb-4 text-emerald-300">
                        <span class="text-pink-400">if</span> guess <span id="slot2" class="code-slot" onclick="clearSlot(2)">---</span> secret_number {<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-blue-300">println!</span>(<span class="text-yellow-300">"🔥 Too high! Go lower!"</span>);<br>
                        }
                    </div>
                    <div id="puzzle2-feedback" class="text-rose-400 h-6 mb-4 text-xs md:text-sm font-bold"></div>
                    <div class="border-t border-purple-900 pt-3">
                        <div class="flex flex-wrap gap-4 justify-center text-xl">
                            <div class="code-option code-font" onclick="selectOption(this, 2, '<')">&lt;</div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, '>')">&gt;</div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, '==')">==</div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="run-puzzle2-btn" class="bg-purple-700 hover:bg-purple-600 text-white px-6 py-2 rounded font-bold opacity-50 cursor-not-allowed transition" onclick="checkPuzzle2()" disabled>
                            <span id="puzzle2-btn-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 4: actual game -->
                <div id="mission-4" class="mission-view hidden flex-grow flex flex-col">
                    <div id="mission4-step" class="text-yellow-400 mb-2 border-b border-purple-800 pb-2 text-sm md:text-base"></div>
                    <div id="game-console" class="terminal-block flex-grow overflow-y-auto mb-4 text-xs md:text-sm code-font" style="max-height: 220px;">
                        <div id="game-welcome" class="text-emerald-400 mb-2"></div>
                        <div id="game-prompt" class="text-slate-300 mb-2"></div>
                        <div id="game-history"></div>
                    </div>
                    <div class="flex gap-2">
                        <span class="text-purple-400 mt-2">$ ></span>
                        <input type="number" id="guess-input" class="bg-slate-800 text-white border border-purple-500 rounded px-3 py-2 flex-grow focus:outline-none focus:ring-2 focus:ring-purple-400 code-font text-sm md:text-base" onkeypress="handleEnter(event)">
                        <button id="guess-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded font-bold text-sm md:text-base" onclick="submitGuess()"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Success Screen -->
        <div id="success-screen" class="hidden absolute inset-0 bg-slate-900/95 backdrop-blur-md rounded-[16px] z-40 flex flex-col items-center justify-center fade-in p-4">
            <div class="text-6xl md:text-7xl mb-4 animate-bounce">🌟🏆🌟</div>
            <h2 id="success-title" class="text-2xl md:text-4xl font-bold text-white mb-2 text-center px-4"></h2>
            <p id="success-message" class="text-base md:text-xl text-purple-400 mb-6 text-center px-4"></p>
            <div class="flex flex-col sm:flex-row gap-4">
                <button class="bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-3 rounded-xl font-bold text-base md:text-lg" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right ml-2"></i> <span id="restart-btn-text"></span>
                </button>
                <button id="next-chapter-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold text-base md:text-lg" onclick="goToNextChapter()">
                    <i class="fa-solid fa-arrow-right ml-2"></i> <span id="next-chapter-text"></span>
                </button>
            </div>
        </div>
    </div>

        // Helper functions
        function formatNumber(num, lang) {
            const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
            const westernDigits = '0123456789';
            let str = num.toString();
            if (lang !== 'fa') {
                return str.replace(/[۰-۹]/g, d => westernDigits[persianDigits.indexOf(d)]);
            } else {
                return str.replace(/[0-9]/g, d => persianDigits[parseInt(d)]);
            }
        }

        const nextIcon = document.getElementById('next-icon');

        // Build language bar dynamically
        function buildLanguageButtons() {
            const bar = document.getElementById('language-bar');
            bar.innerHTML = '';
            for (const [code, data] of Object.entries(languagePack)) {
                const btn = document.createElement('button');
                btn.innerText = data.name;
                btn.className = `px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors ${currentLang === code ? 'bg-purple-500 text-white' : 'text-slate-300 hover:text-white'}`;
                btn.onclick = () => setLang(code);
                bar.appendChild(btn);
            }
        }

        function stopTyping() {
            if (typeInterval) { clearTimeout(typeInterval); typeInterval = null; }
            isTyping = false;
        }

        function startTyping(text, callback) {
            stopTyping();
            dialogTextP.innerHTML = '';
            isTyping = true;
            currentTypingText = text;
            let i = 0;
            function typeNext() {
                if (i < text.length && isTyping) {
                    dialogTextP.innerHTML += text.charAt(i);
                    i++;
                    typeInterval = setTimeout(typeNext, 35);
                } else if (i >= text.length) {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            typeNext();
        }

        function showDialog() {
            const pack = languagePack[currentLang];
            const text = pack.dialogues[currentDialogIndex];
            nextDialogBtn.classList.add('hidden');
            if(currentDialogIndex === 0) {
                document.querySelector('.dashboard').classList.add('shake');
                setTimeout(() => document.querySelector('.dashboard').classList.remove('shake'), 500);
            }
            startTyping(text, () => {
                nextDialogBtn.classList.remove('hidden');
            });
        }

        function nextDialog() {
            if (isTyping) {
                stopTyping();
                dialogTextP.innerHTML = currentTypingText;
                isTyping = false;
                nextDialogBtn.classList.remove('hidden');
                return;
            }
            currentDialogIndex++;
            const pack = languagePack[currentLang];
            if (currentDialogIndex < pack.dialogues.length) {
                showDialog();
            } else {
                currentStep = 1;
                nextDialogBtn.classList.add('hidden');
                dialogTextP.innerHTML = pack.afterDialog;
                gameAreaDiv.classList.remove('hidden');
                startMission(1);
            }
        }

        function updateAllTexts() {
            const pack = languagePack[currentLang];
            if (!pack) return;

            // HUD
            hpLabelSpan.innerText = pack.hpLabel;
            starLabelSpan.innerText = pack.starLabel;
            if (gameWon) starStatusSpan.innerHTML = pack.starUnlocked;
            else starStatusSpan.innerHTML = currentLang === 'fa' ? "قفل شده 🔒" : (currentLang === 'en' ? "Locked 🔒" : (currentLang === 'es' ? "Bloqueado 🔒" : (currentLang === 'de' ? "Gesperrt 🔒" : "Vergrendeld 🔒")));
            
            ferrisNameH3.innerText = pack.ferrisName;
            nextBtnSpan.innerText = pack.nextButton;
            nextIcon.className = `fa-solid ${pack.nextIcon} ml-1`;

            // Mission 1
            document.getElementById('mission1-title').innerHTML = pack.mission1Title;
            document.getElementById('mission1-text').innerHTML = pack.mission1Text;
            document.getElementById('mission1-btn').innerHTML = pack.mission1Btn;

            // Mission 2
            document.getElementById('mission2-step').innerHTML = pack.mission2Step;
            document.getElementById('mission2-desc').innerHTML = pack.mission2Desc;
            document.getElementById('puzzle1-btn-text').innerHTML = pack.puzzle1Btn;

            // Mission 3
            document.getElementById('mission3-step').innerHTML = pack.mission3Step;
            document.getElementById('mission3-desc').innerHTML = pack.mission3Desc;
            document.getElementById('puzzle2-btn-text').innerHTML = pack.puzzle2Btn;

            // Mission 4
            document.getElementById('mission4-step').innerHTML = pack.mission4Step;
            document.getElementById('game-welcome').innerHTML = pack.gameWelcome;
            document.getElementById('game-prompt').innerHTML = pack.gamePrompt;
            guessInput.placeholder = pack.guessPlaceholder;
            guessBtn.innerText = pack.guessBtn;

            // Success screen
            document.getElementById('success-title').innerHTML = pack.successTitle;
            document.getElementById('success-message').innerHTML = pack.successMessage;
            document.getElementById('restart-btn-text').innerHTML = pack.restartBtn;
            document.getElementById('next-chapter-text').innerHTML = pack.nextChapterBtn;

            if (currentStep === 0) {
                if (currentDialogIndex < pack.dialogues.length) {
                    const currentDialog = pack.dialogues[currentDialogIndex];
                    if (isTyping) {
                        startTyping(currentDialog, () => nextDialogBtn.classList.remove('hidden'));
                    } else {
                        dialogTextP.innerHTML = currentDialog;
                        nextDialogBtn.classList.remove('hidden');
                    }
                } else {
                    dialogTextP.innerHTML = pack.afterDialog;
                }
            } else {
                // already in game
                dialogTextP.innerHTML = pack.afterDialog;
            }
        }

        function setLang(lang) {
            if (!languagePack[lang]) return;
            currentLang = lang;
            const htmlRoot = document.getElementById('html-root');
            htmlRoot.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
            // Update button styles
            const btns = document.querySelectorAll('#language-bar button');
            btns.forEach(btn => {
                const btnLang = Object.keys(languagePack).find(k => languagePack[k].name === btn.innerText);
                if (btnLang === lang) {
                    btn.className = "px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors bg-purple-500 text-white";
                } else {
                    btn.className = "px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors text-slate-300 hover:text-white";
                }
            });
            updateAllTexts();
        }

        function startMission(missionNum) {
            document.querySelectorAll('.mission-view').forEach(el => el.classList.add('hidden'));
            document.getElementById('mission-' + missionNum).classList.remove('hidden');
            if(missionNum === 4) {
                setTimeout(() => guessInput.focus(), 200);
            }
        }

        // Puzzle handlers
        function selectOption(element, puzzleNum, word) {
            if ((puzzleNum === 1 && puzzle1Completed) || (puzzleNum === 2 && puzzle2Completed)) return;
            element.parentElement.querySelectorAll('.code-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            const slot = document.getElementById('slot' + puzzleNum);
            const runBtn = document.getElementById('run-puzzle' + puzzleNum + '-btn');
            slot.innerText = word;
            slot.classList.add('filled');
            runBtn.disabled = false;
            runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('puzzle' + puzzleNum + '-feedback').innerText = "";
            if (puzzleNum === 1) selectedWord1 = word;
            else selectedWord2 = word;
        }

        function clearSlot(puzzleNum) {
            if ((puzzleNum === 1 && puzzle1Completed) || (puzzleNum === 2 && puzzle2Completed)) return;
            const slot = document.getElementById('slot' + puzzleNum);
            const runBtn = document.getElementById('run-puzzle' + puzzleNum + '-btn');
            slot.innerText = "---";
            slot.classList.remove('filled');
            runBtn.disabled = true;
            runBtn.classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('puzzle' + puzzleNum + '-feedback').innerText = "";
            document.querySelectorAll(`#mission-${puzzleNum+1} .code-option`).forEach(el => el.classList.remove('selected'));
        }

        // Game logic
        function appendHistory(text, colorClass) {
            const history = document.getElementById('game-history');
            const div = document.createElement('div');
            div.className = `mt-1 ${colorClass}`;
            div.innerText = text;
            history.appendChild(div);
            const consoleBox = document.getElementById('game-console');
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function handleEnter(e) { if (e.key === 'Enter') submitGuess(); }

        function submitGuess() {
            if (gameWon) return;
            const pack = languagePack[currentLang];
            const inputVal = guessInput.value.trim();
            if (!inputVal || isNaN(inputVal)) {
                appendHistory(pack.errorNotNumber, "text-rose-400");
                guessInput.value = '';
                return;
            }
            const guessNum = parseInt(inputVal);
            attemptCount++;
            appendHistory(`> ${guessNum}`, "text-white opacity-80");

            if (guessNum < targetSecretNumber) {
                if (targetSecretNumber - guessNum < 5) {
                    appendHistory(pack.feedbackLowClose, "text-orange-400");
                } else {
                    appendHistory(pack.feedbackLow, "text-blue-300");
                }
            } else if (guessNum > targetSecretNumber) {
                if (guessNum - targetSecretNumber < 5) {
                    appendHistory(pack.feedbackHighClose, "text-orange-400");
                } else {
                    appendHistory(pack.feedbackHigh, "text-red-400");
                }
            } else {
                // win
                gameWon = true;
                appendHistory(pack.winMessage(attemptCount), "text-yellow-300 font-bold text-lg mt-2");
                guessInput.disabled = true;
                guessBtn.disabled = true;
                starStatusSpan.innerHTML = pack.starUnlocked;
                starStatusSpan.classList.add('animate-pulse', 'text-yellow-300');
                triggerConfetti();
                setTimeout(() => {
                    document.getElementById('success-screen').classList.remove('hidden');
                }, 2000);
            }
            guessInput.value = '';
            guessInput.focus();
        }

        // --- Confetti (unchanged) ---
        let W = window.innerWidth, H = window.innerHeight;
        const canvas = document.getElementById('confetti');
        const context = canvas.getContext('2d');
        const maxConfettis = 120;
        const particles = [];
        const possibleColors = ["#fb923c", "#fcd34d", "#c084fc", "#34d399", "#f472b6"];
        function randomFromTo(from, to) { return Math.floor(Math.random() * (to - from + 1) + from); }
        function confettiParticle() {
            this.x = Math.random() * W;
            this.y = Math.random() * H - H;
            this.r = randomFromTo(11, 25);
            this.d = Math.random() * maxConfettis + 11;
            this.color = possibleColors[Math.floor(Math.random() * possibleColors.length)];
            this.tilt = Math.floor(Math.random() * 33) - 11;
            this.tiltAngleIncremental = (Math.random() * 0.07) + 0.05;
            this.tiltAngle = 0;
            this.draw = function() {
                context.beginPath();
                context.lineWidth = this.r / 2;
                context.strokeStyle = this.color;
                context.moveTo(this.x + this.tilt + this.r / 3, this.y);
                context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
                return context.stroke();
            };
        }
        let animationId = null;
        function Draw() {
            animationId = requestAnimationFrame(Draw);
            context.clearRect(0, 0, W, H);
            for (let i = 0; i < maxConfettis; i++) particles[i].draw();
            for (let i = 0; i < maxConfettis; i++) {
                const p = particles[i];
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.tilt = Math.sin(p.tiltAngle - i / 3) * 15;
                if (p.x > W + 30 || p.x < -30 || p.y > H) {
                    p.x = Math.random() * W;
                    p.y = -30;
                    p.tilt = Math.floor(Math.random() * 10) - 20;
                }
            }
        }
        window.addEventListener('resize', () => {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W; canvas.height = H;
        });
        function triggerConfetti() {
            canvas.width = W; canvas.height = H;
            particles.length = 0;
            for (let i = 0; i < maxConfettis; i++) particles.push(new confettiParticle());
            if(!animationId) Draw();
        }

        // Initialization
        buildLanguageButtons();
        setTimeout(() => {
            setLang('fa');
            showDialog();
        }, 500);
    </script>
</body>
</html>
