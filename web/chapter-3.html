<!DOCTYPE html>
<html lang="fa" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Land of Rust: Chapter 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1e111a;
            --crt-bg: #2d1b2e;
        }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(244, 114, 182, 0.1) 2px, transparent 40px), radial-gradient(rgba(251, 191, 36, 0.05) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            color: white;
            overflow-x: hidden;
        }
        html[dir="rtl"] body { font-family: 'Vazirmatn', sans-serif; }
        html[dir="ltr"] body { font-family: 'Nunito', sans-serif; }
        .code-font { font-family: 'JetBrains Mono', monospace !important; }
        /* Force LTR for code blocks */
        .terminal-block, .code-slot, .code-option, .code-font, pre, code, #calc-console, select.op-select {
            direction: ltr !important;
            text-align: left !important;
        }
        .dashboard {
            background: linear-gradient(180deg, #3f2033 0%, #1e111a 100%);
            border: 4px solid #831843;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .screen-crt {
            background-color: var(--crt-bg);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            border: 4px solid #4c1d95;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.5s;
        }
        .screen-crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .dialog-box {
            background: rgba(255, 241, 242, 0.95);
            color: #4c0519;
            border-radius: 15px;
            border: 3px solid #f43f5e;
            position: relative;
        }
        html[dir="rtl"] .dialog-box::after {
            content: ''; position: absolute; bottom: -15px; right: 40px;
            border-width: 15px 15px 0; border-style: solid; border-color: rgba(255, 241, 242, 0.95) transparent transparent transparent;
        }
        html[dir="ltr"] .dialog-box::after {
            content: ''; position: absolute; bottom: -15px; left: 40px;
            border-width: 15px 15px 0; border-style: solid; border-color: rgba(255, 241, 242, 0.95) transparent transparent transparent;
        }
        .ferris-avatar {
            width: 90px; height: 90px;
            background: #fff1f2; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; border: 4px solid #f43f5e;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .code-slot {
            display: inline-block; min-width: 50px; height: 30px;
            border-bottom: 3px dashed #fbbf24; margin: 0 5px;
            vertical-align: middle; text-align: center;
            color: #fbbf24; background: rgba(255, 255, 255, 0.1);
            border-radius: 5px; cursor: pointer; transition: all 0.3s;
        }
        .code-slot.filled { border: 2px solid #f472b6; background: rgba(244, 114, 182, 0.2); color: #fdf2f8; }
        .code-option {
            background: #4a044e; border: 2px solid #86198f;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; user-select: none;
        }
        .code-option:hover { background: #701a75; transform: scale(1.05); }
        .code-option.selected { background: #db2777; border-color: #fbcfe8; color: white; font-weight: bold; }
        .glitch { animation: glitch-skew 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-4deg); }
            40% { transform: skew(4deg); }
            60% { transform: skew(-2deg); }
            80% { transform: skew(2deg); }
            100% { transform: skew(0deg); }
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .terminal-block {
            background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 640px) {
            .dashboard { padding: 1rem !important; }
            .ferris-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
            .dialog-box { padding: 0.75rem !important; }
            .code-slot { min-width: 45px; font-size: 0.9rem; }
            .code-option { padding: 4px 10px; font-size: 0.9rem; }
        }
        .op-select {
            appearance: none; background-color: #4a044e; border: 2px solid #86198f;
            color: white; padding: 0.5rem 1rem; border-radius: 0.5rem;
            cursor: pointer; font-weight: bold;
        }
        .op-select:focus { outline: none; border-color: #f472b6; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-4 pb-20">

    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <div class="dashboard w-full max-w-4xl p-4 md:p-8 relative">

        <!-- Dynamic Language Bar -->
        <div class="absolute top-[-20px] left-1/2 transform -translate-x-1/2 bg-slate-800 rounded-full p-1 border border-slate-600 flex shadow-lg gap-1" id="language-bar" dir="ltr"></div>

        <!-- HUD -->
        <div class="flex justify-between items-center mb-6 border-b border-pink-900 pb-4 mt-2">
            <div class="flex gap-4 font-bold text-sm md:text-base" id="hud-stats">
                <div class="text-rose-500"><i class="fa-solid fa-utensils"></i> <span id="hunger-label"></span> <span id="hunger-value">100%</span></div>
                <div class="text-amber-400"><i class="fa-solid fa-cake-candles"></i> <span id="cakes-label"></span> <span id="cakes-value">0</span></div>
            </div>
            <div class="text-pink-300 code-font text-xs md:text-sm opacity-70">BAKERY-OS v3.0 (Function Module)</div>
        </div>

        <!-- Dialog Box -->
        <div class="flex flex-col md:flex-row items-end gap-4 mb-8">
            <div class="ferris-avatar shadow-lg z-10 shrink-0">🦀</div>
            <div class="dialog-box p-4 md:p-5 shadow-xl w-full border-rose-500">
                <h3 id="ferris-name" class="font-bold text-rose-600 mb-2"></h3>
                <p id="dialog-text" class="text-base md:text-lg leading-relaxed min-h-[70px] font-bold"></p>
                <div class="mt-3 flex justify-end">
                    <button id="next-dialog-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-lg font-bold transition text-sm hidden" onclick="nextDialog()">
                        <span id="next-btn-text"></span> <i id="next-icon" class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area" class="hidden fade-in">
            <div id="crt-monitor" class="screen-crt p-4 md:p-6 font-mono text-pink-300 code-font min-h-[400px] flex flex-col">

                <!-- Mission 1: Intro -->
                <div id="mission-1" class="mission-view flex-grow">
                    <div class="text-center mb-4 border-b border-pink-900 pb-2">
                        <h2 id="mission1-title" class="text-lg md:text-xl font-bold text-white"></h2>
                    </div>
                    <div id="mission1-text" class="leading-relaxed space-y-3 text-sm md:text-base"></div>
                    <div class="mt-8 text-center">
                        <button id="mission1-btn" class="bg-rose-700 hover:bg-rose-600 text-white px-6 py-2 rounded font-bold code-font" onclick="startMission(2)"></button>
                    </div>
                </div>

                <!-- Mission 2: Return Arrow Puzzle -->
                <div id="mission-2" class="mission-view hidden flex-grow">
                    <div id="mission2-step" class="text-amber-400 mb-2 text-sm md:text-base"></div>
                    <div id="mission2-desc" class="text-sm md:text-base text-slate-300 mb-4 space-y-2"></div>
                    <div class="terminal-block text-base md:text-lg mb-4 text-emerald-300">
                        <span class="text-rose-400">fn</span> add_sugar(a: i32, b: i32) <span id="slot1" class="code-slot" onclick="clearSlot(1)">---</span> i32 {<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;a + b
                        }
                    </div>
                    <div id="puzzle1-feedback" class="text-rose-400 h-6 mb-4 text-xs md:text-sm font-bold"></div>
                    <div class="border-t border-pink-900 pt-3">
                        <div class="flex flex-wrap gap-2 justify-center">
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '=>')">=&gt;</div>
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '->')">-&gt;</div>
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '<-')">&lt;-</div>
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '>>')">&gt;&gt;</div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="run-puzzle1-btn" class="bg-rose-700 hover:bg-rose-600 text-white px-6 py-2 rounded font-bold opacity-50 cursor-not-allowed transition" onclick="checkPuzzle1()" disabled>
                            <span id="puzzle1-btn-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 3: Data Type Puzzle -->
                <div id="mission-3" class="mission-view hidden flex-grow">
                    <div id="mission3-step" class="text-amber-400 mb-2 text-sm md:text-base"></div>
                    <p id="mission3-desc" class="text-sm md:text-base text-slate-300 mb-4"></p>
                    <div class="terminal-block text-base md:text-lg mb-4 text-emerald-300">
                        <span class="text-slate-400">// Ferris planet gravity</span><br>
                        <span class="text-rose-400">let</span> gravity: <span id="slot2" class="code-slot" onclick="clearSlot(2)">---</span> = 9.81;
                    </div>
                    <div id="puzzle2-feedback" class="text-rose-400 h-6 mb-4 text-xs md:text-sm font-bold"></div>
                    <div class="border-t border-pink-900 pt-3">
                        <div class="flex flex-wrap gap-4 justify-center">
                            <div class="code-option code-font" onclick="selectOption(this, 2, 'i32')">i32 <span class="text-xs text-slate-400 block">(int)</span></div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, 'f64')">f64 <span class="text-xs text-slate-400 block">(float)</span></div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, 'bool')">bool <span class="text-xs text-slate-400 block">(bool)</span></div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, 'char')">char <span class="text-xs text-slate-400 block">(char)</span></div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="run-puzzle2-btn" class="bg-rose-700 hover:bg-rose-600 text-white px-6 py-2 rounded font-bold opacity-50 cursor-not-allowed transition" onclick="checkPuzzle2()" disabled>
                            <span id="puzzle2-btn-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 4: Calculator Terminal -->
                <div id="mission-4" class="mission-view hidden flex-grow flex flex-col">
                    <div class="text-amber-400 mb-2 border-b border-pink-800 pb-2 flex justify-between items-center">
                        <span id="mission4-step"></span>
                        <div class="text-xs bg-pink-900 px-2 py-1 rounded">Project 3.5.2</div>
                    </div>
                    <div id="calc-mission-desc" class="text-sm mb-2 text-slate-300"></div>
                    <div id="calc-console" class="terminal-block flex-grow overflow-y-auto mb-4 text-xs md:text-sm code-font" style="max-height: 180px;">
                        <div id="calc-initial" class="text-pink-400 mb-2"></div>
                        <div id="calc-history"></div>
                    </div>
                    <div class="flex flex-wrap gap-2 items-center bg-slate-900/50 p-2 rounded-lg border border-pink-900">
                        <input type="number" id="num-a" class="w-16 md:w-20 bg-slate-800 text-white border border-pink-700 rounded px-2 py-2 focus:outline-none focus:ring-2 focus:ring-rose-500 code-font text-center" value="5">
                        <select id="op-select" class="op-select code-font">
                            <option value="add">+</option>
                            <option value="subtract">-</option>
                            <option value="multiply">*</option>
                            <option value="divide">/</option>
                        </select>
                        <input type="number" id="num-b" class="w-16 md:w-20 bg-slate-800 text-white border border-pink-700 rounded px-2 py-2 focus:outline-none focus:ring-2 focus:ring-rose-500 code-font text-center" value="3">
                        <button id="calc-run-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded font-bold ml-auto" onclick="runCalculator()"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Success Screen -->
        <div id="success-screen" class="hidden absolute inset-0 bg-slate-900/95 backdrop-blur-md rounded-[16px] z-40 flex flex-col items-center justify-center fade-in p-4">
            <div class="text-6xl md:text-7xl mb-4 animate-bounce">🎂🦀🎓</div>
            <h2 id="success-title" class="text-2xl md:text-4xl font-bold text-white mb-2 text-center px-4"></h2>
            <p id="success-message" class="text-base md:text-xl text-pink-400 mb-6 text-center px-4"></p>
            <div class="flex flex-col sm:flex-row gap-4">
                <button class="bg-rose-600 hover:bg-rose-500 text-white px-6 py-3 rounded-xl font-bold text-base md:text-lg shadow-[0_0_15px_rgba(225,29,72,0.6)]" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right ml-2"></i> <span id="restart-btn-text"></span>
                </button>
                <button id="next-chapter-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold text-base md:text-lg" onclick="goToNextChapter()">
                    <i class="fa-solid fa-arrow-right ml-2"></i> <span id="next-chapter-text"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // LANGUAGE PACK (5 languages)
        // --------------------------------------------------------------
        const languagePack = {
            fa: {
                name: "فارسی",
                hungerLabel: "گرسنگی فریس:",
                cakesLabel: "کیک‌های پخته شده:",
                ferrisName: "فریس خرچنگ:",
                nextButton: "بعدی",
                nextIcon: "fa-chevron-left",
                dialogues: [
                    "سلام! من خیلی گرسنه‌ام و دلم کیک شکلاتی فضایی می‌خواد! 🍰",

                    "توی برنامه‌نویسی وقتی یک کار تکراری داریم، از «تابع» (Function) استفاده می‌کنیم.",

                ],
                afterDialog: "عالیه! به مانیتور پایین نگاه کن تا ماشین تابع رو بسازیم.",
                mission1Title: "فصل ۳: دستور پخت کیک شکلاتی 🍰",
                mission1Text: `
                    <p class="text-amber-200">> در برنامه‌نویسی وقتی یک کار تکراری داریم، به جای نوشتن دوباره کدها، از <strong>تابع (Function)</strong> استفاده می‌کنیم.</p>
                    <p class="text-slate-300">> تابع دقیقا مثل یک «دستور پخت جادویی» است. یک بار آن را می‌نویسیم و هر چند بار که بخواهیم از آن کیک (خروجی) می‌گیریم!</p>

            en: {

                        }<br>
                        <span class="text-slate-400">// Now we can call it a thousand times:</span><br>
                        <span class="text-pink-200">bake_cake();</span>
                    </div>
                `,

        // Helper functions
        function formatNumber(num, lang) {
            const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
            const westernDigits = '0123456789';
            let str = num.toString();
            if (lang !== 'fa') return str.replace(/[۰-۹]/g, d => westernDigits[persianDigits.indexOf(d)]);
            else return str.replace(/[0-9]/g, d => persianDigits[parseInt(d)]);
        }

        // Game state
        let currentLang = 'fa';
        let currentStep = 0;
        let currentDialogIndex = 0;
        let typeInterval = null;
        let isTyping = false;
        let currentTypingText = '';
        let hunger = 100;
        let totalCakes = 0;
        let puzzle1Completed = false, puzzle2Completed = false;

        // DOM elements
        const hungerLabelSpan = document.getElementById('hunger-label');
        const cakesLabelSpan = document.getElementById('cakes-label');
        const hungerValueSpan = document.getElementById('hunger-value');
        const cakesValueSpan = document.getElementById('cakes-value');
        const ferrisNameH3 = document.getElementById('ferris-name');
        const nextDialogBtn = document.getElementById('next-dialog-btn');
        const nextBtnSpan = document.getElementById('next-btn-text');
        const nextIcon = document.getElementById('next-icon');
        const dialogTextP = document.getElementById('dialog-text');
        const gameAreaDiv = document.getElementById('game-area');

        // Build language bar dynamically
        function buildLanguageButtons() {
            const bar = document.getElementById('language-bar');
            bar.innerHTML = '';
            for (const [code, data] of Object.entries(languagePack)) {
                const btn = document.createElement('button');
                btn.innerText = data.name;
                btn.className = `px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors ${currentLang === code ? 'bg-pink-600 text-white' : 'text-slate-300 hover:text-white'}`;
                btn.onclick = () => setLang(code);
                bar.appendChild(btn);
            }
        }

        function stopTyping() {
            if (typeInterval) { clearTimeout(typeInterval); typeInterval = null; }
            isTyping = false;
        }

        function startTyping(text, callback) {
            stopTyping();
            dialogTextP.innerHTML = '';
            isTyping = true;
            currentTypingText = text;
            let i = 0;
            function typeNext() {
                if (i < text.length && isTyping) {
                    dialogTextP.innerHTML += text.charAt(i);
                    i++;
                    typeInterval = setTimeout(typeNext, 35);
                } else if (i >= text.length) {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            typeNext();
        }

        function showDialog() {
            const pack = languagePack[currentLang];
            const text = pack.dialogues[currentDialogIndex];
            nextDialogBtn.classList.add('hidden');
            if (currentDialogIndex === 0) {
                document.querySelector('.dashboard').classList.add('shake');
                setTimeout(() => document.querySelector('.dashboard').classList.remove('shake'), 500);
            }
            startTyping(text, () => {
                nextDialogBtn.classList.remove('hidden');
            });
        }

        function nextDialog() {
            if (isTyping) {
                stopTyping();
                dialogTextP.innerHTML = currentTypingText;
                isTyping = false;
                nextDialogBtn.classList.remove('hidden');
                return;
            }
            currentDialogIndex++;
            const pack = languagePack[currentLang];
            if (currentDialogIndex < pack.dialogues.length) {
                showDialog();
            } else {
                currentStep = 1;
                nextDialogBtn.classList.add('hidden');
                dialogTextP.innerHTML = pack.afterDialog;
                gameAreaDiv.classList.remove('hidden');
                startMission(1);
            }
        }

        function updateAllTexts() {
            const pack = languagePack[currentLang];
            if (!pack) return;

            hungerLabelSpan.innerText = pack.hungerLabel;
            cakesLabelSpan.innerText = pack.cakesLabel;
            hungerValueSpan.innerText = formatNumber(hunger, currentLang) + '%';
            cakesValueSpan.innerText = formatNumber(totalCakes, currentLang);
            ferrisNameH3.innerText = pack.ferrisName;
            nextBtnSpan.innerText = pack.nextButton;
            nextIcon.className = `fa-solid ${pack.nextIcon} ml-1`;

            // Mission 1
            document.getElementById('mission1-title').innerHTML = pack.mission1Title;
            document.getElementById('mission1-text').innerHTML = pack.mission1Text;
            document.getElementById('mission1-btn').innerHTML = pack.mission1Btn;

            // Mission 2
            document.getElementById('mission2-step').innerHTML = pack.mission2Step;
            document.getElementById('mission2-desc').innerHTML = pack.mission2Desc;
            document.getElementById('puzzle1-btn-text').innerHTML = pack.puzzle1Btn;

            // Mission 3
            document.getElementById('mission3-step').innerHTML = pack.mission3Step;
            document.getElementById('mission3-desc').innerHTML = pack.mission3Desc;
            document.getElementById('puzzle2-btn-text').innerHTML = pack.puzzle2Btn;

            // Mission 4
            document.getElementById('mission4-step').innerHTML = pack.mission4Step;
            document.getElementById('calc-mission-desc').innerHTML = pack.calcMissionDesc;
            document.getElementById('calc-initial').innerHTML = pack.calcInitialMsg;
            document.getElementById('calc-run-btn').innerHTML = pack.calcRunBtn;

            // Success screen
            document.getElementById('success-title').innerHTML = pack.winTitle;
            document.getElementById('success-message').innerHTML = pack.winMessage;
            document.getElementById('restart-btn-text').innerHTML = pack.restartBtn;
            document.getElementById('next-chapter-text').innerHTML = pack.nextChapterBtn;

            if (currentStep === 0) {
                if (currentDialogIndex < pack.dialogues.length) {
                    const currentDialog = pack.dialogues[currentDialogIndex];
                    if (isTyping) {
                        startTyping(currentDialog, () => nextDialogBtn.classList.remove('hidden'));
                    } else {
                        dialogTextP.innerHTML = currentDialog;
                        nextDialogBtn.classList.remove('hidden');
                    }
                } else {
                    dialogTextP.innerHTML = pack.afterDialog;
                }
            } else {
                dialogTextP.innerHTML = pack.afterDialog;
            }
        }

        function setLang(lang) {
            if (!languagePack[lang]) return;
            currentLang = lang;
            const htmlRoot = document.getElementById('html-root');
            htmlRoot.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
            const btns = document.querySelectorAll('#language-bar button');
            btns.forEach(btn => {
                const btnLang = Object.keys(languagePack).find(k => languagePack[k].name === btn.innerText);
                if (btnLang === lang) {
                    btn.className = "px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors bg-pink-600 text-white";
                } else {
                    btn.className = "px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors text-slate-300 hover:text-white";
                }
            });
            updateAllTexts();
        }

        function startMission(missionNum) {
            document.querySelectorAll('.mission-view').forEach(el => el.classList.add('hidden'));
            document.getElementById('mission-' + missionNum).classList.remove('hidden');
            if (missionNum === 4) {
                // focus on first input
                setTimeout(() => document.getElementById('num-a').focus(), 200);
            }
        }

        // Puzzle handlers
        function selectOption(element, puzzleNum, word) {
            if ((puzzleNum === 1 && puzzle1Completed) || (puzzleNum === 2 && puzzle2Completed)) return;
            element.parentElement.querySelectorAll('.code-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            const slot = document.getElementById('slot' + puzzleNum);
            const runBtn = document.getElementById('run-puzzle' + puzzleNum + '-btn');
            slot.innerText = word;
            slot.classList.add('filled');
            runBtn.disabled = false;
            runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('puzzle' + puzzleNum + '-feedback').innerText = "";
        }

        function clearSlot(puzzleNum) {
            if ((puzzleNum === 1 && puzzle1Completed) || (puzzleNum === 2 && puzzle2Completed)) return;
            const slot = document.getElementById('slot' + puzzleNum);
            const runBtn = document.getElementById('run-puzzle' + puzzleNum + '-btn');
            slot.innerText = "---";
            slot.classList.remove('filled');
            runBtn.disabled = true;
            runBtn.classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('puzzle' + puzzleNum + '-feedback').innerText = "";
            document.querySelectorAll(`#mission-${puzzleNum+1} .code-option`).forEach(el => el.classList.remove('selected'));
        }

        function checkPuzzle1() {
            if (puzzle1Completed) return;
            const slotText = document.getElementById('slot1').innerText;
            const feedback = document.getElementById('puzzle1-feedback');
            const crt = document.getElementById('crt-monitor');
            if (slotText === '->') {
                feedback.className = "text-emerald-400 h-6 mb-4 font-bold text-sm";
                feedback.innerText = languagePack[currentLang].puzzle1Success;
                puzzle1Completed = true;
                const runBtn = document.getElementById('run-puzzle1-btn');
                runBtn.disabled = true;
                runBtn.classList.add('opacity-50', 'cursor-not-allowed');
                setTimeout(() => startMission(3), 1500);
            } else {
                crt.classList.add('glitch');
                setTimeout(() => crt.classList.remove('glitch'), 400);
                feedback.innerText = languagePack[currentLang].puzzle1Error;
            }
        }

        function checkPuzzle2() {
            if (puzzle2Completed) return;
            const slotText = document.getElementById('slot2').innerText;
            const feedback = document.getElementById('puzzle2-feedback');
            const crt = document.getElementById('crt-monitor');
            if (slotText === 'f64') {
                feedback.className = "text-emerald-400 h-6 mb-4 font-bold text-sm";
                feedback.innerText = languagePack[currentLang].puzzle2Success;
                puzzle2Completed = true;
                const runBtn = document.getElementById('run-puzzle2-btn');
                runBtn.disabled = true;
                runBtn.classList.add('opacity-50', 'cursor-not-allowed');
                setTimeout(() => startMission(4), 1500);
            } else {
                crt.classList.add('glitch');
                setTimeout(() => crt.classList.remove('glitch'), 400);
                feedback.innerText = languagePack[currentLang].puzzle2Error;
            }
        }

        // Calculator logic
        function appendHistory(text, colorClass) {
            const history = document.getElementById('calc-history');
            const div = document.createElement('div');
            div.className = `mt-1 ${colorClass}`;
            div.innerHTML = text;
            history.appendChild(div);
            const consoleBox = document.getElementById('calc-console');
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function runCalculator() {
            const pack = languagePack[currentLang];
            const a = parseFloat(document.getElementById('num-a').value);
            const b = parseFloat(document.getElementById('num-b').value);
            const opSelect = document.getElementById('op-select');
            const op = opSelect.value;
            const opSymbol = opSelect.options[opSelect.selectedIndex].text;

            if (isNaN(a) || isNaN(b)) {
                appendHistory(pack.errorNotNumber, "text-rose-500");
                return;
            }

            let result = 0;
            switch (op) {
                case 'add': result = a + b; break;
                case 'subtract': result = a - b; break;
                case 'multiply': result = a * b; break;
                case 'divide':
                    if (b === 0) {
                        appendHistory(pack.errorDivisionZero, "text-rose-500 bg-rose-900/30 p-1 rounded");
                        return;
                    }
                    result = a / b;
                    break;
            }
            result = Math.round(result * 100) / 100;

            // Log function call
            appendHistory(pack.calcCallMsg(opSymbol, a, b), "text-slate-400");
            appendHistory(pack.calcReturnMsg(result), "text-white");

            if (result > 0) {
                const cakesEaten = Math.floor(result);
                totalCakes += cakesEaten;
                hunger = Math.max(0, hunger - cakesEaten * 5);
                appendHistory(pack.calcCakeMsg(cakesEaten), "text-amber-200 mt-1 mb-2 border-b border-pink-900/50 pb-1");
            } else {
                appendHistory(`<span class="text-slate-400">${pack.calcZeroResultMsg}</span>`, "text-slate-400 mb-2 border-b border-pink-900/50 pb-1");
            }

            // Update HUD
            hungerValueSpan.innerText = formatNumber(hunger, currentLang) + '%';
            cakesValueSpan.innerText = formatNumber(totalCakes, currentLang);

            if (hunger <= 50) {
                hungerValueSpan.parentElement.classList.replace('text-rose-500', 'text-emerald-400');
            }

            if (hunger <= 0) {
                triggerConfetti();
                setTimeout(() => {
                    document.getElementById('success-screen').classList.remove('hidden');
                }, 1500);
            }
        }

        function goToNextChapter() {
            window.location.href = 'chapter-4.html';
        }

        // --- Confetti System (unchanged) ---
        let W = window.innerWidth, H = window.innerHeight;
        const canvas = document.getElementById('confetti');
        const context = canvas.getContext('2d');
        const maxConfettis = 100;
        const particles = [];
        const possibleColors = ["#f472b6", "#fbbf24", "#fb923c", "#fdf2f8"];
        function randomFromTo(from, to) { return Math.floor(Math.random() * (to - from + 1) + from); }
        function confettiParticle() {
            this.x = Math.random() * W;
            this.y = Math.random() * H - H;
            this.r = randomFromTo(11, 25);
            this.d = Math.random() * maxConfettis + 11;
            this.color = possibleColors[Math.floor(Math.random() * possibleColors.length)];
            this.tilt = Math.floor(Math.random() * 33) - 11;
            this.tiltAngleIncremental = (Math.random() * 0.07) + 0.05;
            this.tiltAngle = 0;
            this.draw = function() {
                context.beginPath();
                context.lineWidth = this.r / 2;
                context.strokeStyle = this.color;
                context.moveTo(this.x + this.tilt + this.r / 3, this.y);
                context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
                return context.stroke();
            };
        }
        let animationId = null;
        function Draw() {
            animationId = requestAnimationFrame(Draw);
            context.clearRect(0, 0, W, H);
            for (let i = 0; i < maxConfettis; i++) particles[i].draw();
            for (let i = 0; i < maxConfettis; i++) {
                const p = particles[i];
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.tilt = Math.sin(p.tiltAngle - i / 3) * 15;
                if (p.x > W + 30 || p.x < -30 || p.y > H) {
                    p.x = Math.random() * W;
                    p.y = -30;
                    p.tilt = Math.floor(Math.random() * 10) - 20;
                }
            }
        }
        window.addEventListener('resize', () => {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W; canvas.height = H;
        });
        function triggerConfetti() {
            canvas.width = W; canvas.height = H;
            particles.length = 0;
            for (let i = 0; i < maxConfettis; i++) particles.push(new confettiParticle());
            if (!animationId) Draw();
        }

        // Initialization
        buildLanguageButtons();
        setTimeout(() => {
            setLang('fa');
            showDialog();
        }, 500);
    </script>
</body>
</html>
