<!DOCTYPE html>
<html lang="fa" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Land of Rust: Chapter 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --crt-bg: #020617;
        }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(56, 189, 248, 0.1) 2px, transparent 40px), radial-gradient(rgba(250, 204, 21, 0.05) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            color: white;
            overflow-x: hidden;
        }
        html[dir="rtl"] body { font-family: 'Vazirmatn', sans-serif; }
        html[dir="ltr"] body { font-family: 'Nunito', sans-serif; }
        .code-font { font-family: 'JetBrains Mono', monospace !important; }
        /* Force LTR for code blocks */
        .terminal-block, .code-slot, .code-option, .code-font, pre, code, #card-display, .borrow-card {
            direction: ltr !important;
            text-align: left !important;
        }
        .dashboard {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border: 4px solid #3b82f6;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .screen-crt {
            background-color: var(--crt-bg);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            border: 4px solid #1e3a8a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.5s;
        }
        .screen-crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .dialog-box {
            background: rgba(240, 249, 255, 0.95);
            color: #0f172a;
            border-radius: 15px;
            border: 3px solid #3b82f6;
            position: relative;
        }
        html[dir="rtl"] .dialog-box::after {
            content: ''; position: absolute; bottom: -15px; right: 40px;
            border-width: 15px 15px 0; border-style: solid; border-color: rgba(240, 249, 255, 0.95) transparent transparent transparent;
        }
        html[dir="ltr"] .dialog-box::after {
            content: ''; position: absolute; bottom: -15px; left: 40px;
            border-width: 15px 15px 0; border-style: solid; border-color: rgba(240, 249, 255, 0.95) transparent transparent transparent;
        }
        .ferris-avatar {
            width: 90px; height: 90px;
            background: #eff6ff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; border: 4px solid #3b82f6;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .code-slot {
            display: inline-block; min-width: 60px; height: 30px;
            border-bottom: 3px dashed #fbbf24; margin: 0 5px;
            vertical-align: middle; text-align: center;
            color: #fbbf24; background: rgba(255, 255, 255, 0.1);
            border-radius: 5px; cursor: pointer; transition: all 0.3s;
        }
        .code-slot.filled { border: 2px solid #38bdf8; background: rgba(56, 189, 248, 0.2); color: #bae6fd; }
        .code-option {
            background: #1e3a8a; border: 2px solid #3b82f6;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; user-select: none;
        }
        .code-option:hover { background: #2563eb; transform: scale(1.05); }
        .code-option.selected { background: #38bdf8; border-color: #e0f2fe; color: #0f172a; font-weight: bold; }
        .glitch { animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        @keyframes glitch-skew {
            0% { transform: skew(0deg); background-color: #7f1d1d; }
            20% { transform: skew(-10deg); }
            40% { transform: skew(10deg); }
            60% { transform: skew(-5deg); background-color: #991b1b; }
            80% { transform: skew(5deg); }
            100% { transform: skew(0deg); background-color: var(--crt-bg); }
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .terminal-block {
            background: rgba(0,0,0,0.5); border-radius: 8px; padding: 12px; border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .borrow-card {
            display: inline-flex; align-items: center; justify-content: center;
            width: 50px; height: 70px; border-radius: 8px; margin: 4px;
            font-weight: bold; font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .card-blue { background: linear-gradient(135deg, #2563eb, #1e3a8a); color: white; border: 2px solid #60a5fa; }
        .card-gold { background: linear-gradient(135deg, #eab308, #a16207); color: #2e1065; border: 2px solid #fef08a; }
        @media (max-width: 640px) {
            .dashboard { padding: 1rem !important; }
            .ferris-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
            .dialog-box { padding: 0.75rem !important; }
            .code-slot { min-width: 50px; font-size: 0.9rem; }
            .code-option { padding: 4px 10px; font-size: 0.9rem; }
            .borrow-card { width: 40px; height: 55px; font-size: 0.8rem; }
        }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-4 pb-20">

    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <div class="dashboard w-full max-w-4xl p-4 md:p-8 relative">

        <!-- Dynamic Language Bar -->
        <div class="absolute top-[-20px] left-1/2 transform -translate-x-1/2 bg-slate-800 rounded-full p-1 border border-slate-600 flex shadow-lg gap-1" id="language-bar" dir="ltr"></div>

        <!-- HUD -->
        <div class="flex justify-between items-center mb-6 border-b border-blue-900 pb-4 mt-2">
            <div class="flex gap-4 font-bold text-sm md:text-base" id="hud-stats">
                <div class="text-sky-400"><i class="fa-solid fa-tractor"></i> <span id="tractor-label"></span> <span id="tractor-owner">Ferris</span></div>
                <div class="text-emerald-400" id="guard-status-hud"><i class="fa-solid fa-shield-halved"></i> <span id="guard-label"></span> <span id="guard-status">Relaxed 🛡️</span></div>
            </div>
            <div class="text-blue-300 code-font text-xs md:text-sm opacity-70">SECURITY-OS v4.0 (Borrow Checker)</div>
        </div>

        <!-- Dialog Box -->
        <div class="flex flex-col md:flex-row items-end gap-4 mb-8">
            <div class="ferris-avatar shadow-lg z-10 shrink-0">🦀</div>
            <div class="dialog-box p-4 md:p-5 shadow-xl w-full border-blue-500">
                <h3 id="ferris-name" class="font-bold text-blue-600 mb-2"></h3>
                <p id="dialog-text" class="text-base md:text-lg leading-relaxed min-h-[70px] font-bold"></p>
                <div class="mt-3 flex justify-end">
                    <button id="next-dialog-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold transition text-sm hidden" onclick="nextDialog()">
                        <span id="next-btn-text"></span> <i id="next-icon" class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area" class="hidden fade-in">
            <div id="crt-monitor" class="screen-crt p-4 md:p-6 font-mono text-blue-300 code-font min-h-[400px] flex flex-col">

                <!-- Mission 1: Move concept -->
                <div id="mission-1" class="mission-view flex-grow">
                    <div class="text-center mb-4 border-b border-blue-900 pb-2">
                        <h2 id="mission1-title" class="text-lg md:text-xl font-bold text-white"></h2>
                    </div>
                    <div id="mission1-text" class="leading-relaxed space-y-3 text-sm md:text-base"></div>
                    <div class="mt-8 text-center">
                        <button id="mission1-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-6 py-2 rounded font-bold code-font" onclick="triggerMove()">
                            <i class="fa-solid fa-truck-fast"></i> <span id="mission1-btn-text"></span>
                        </button>
                        <p id="move-feedback" class="mt-4 text-rose-400 font-bold hidden"></p>
                        <button id="btn-next-m1" class="mt-4 bg-blue-700 hover:bg-blue-600 text-white px-6 py-2 rounded font-bold code-font hidden mx-auto" onclick="startMission(2)">
                            <span id="next-step-m1-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 2: Normal Reference Puzzle -->
                <div id="mission-2" class="mission-view hidden flex-grow">
                    <div id="mission2-step" class="text-yellow-400 mb-2 text-sm md:text-base"></div>
                    <div id="mission2-desc" class="text-sm md:text-base text-slate-300 mb-4 space-y-2"></div>
                    <div class="terminal-block text-base md:text-lg mb-4 text-emerald-300">
                        <span class="text-pink-400">let</span> s1 = String::from(<span class="text-yellow-300">"tractor"</span>);<br>
                        <span class="text-pink-400">let</span> s2 = <span id="slot1" class="code-slot" onclick="clearSlot(1)">---</span>s1;
                    </div>
                    <div id="puzzle1-feedback" class="text-rose-400 h-6 mb-4 text-xs md:text-sm font-bold"></div>
                    <div class="border-t border-blue-900 pt-3">
                        <div class="flex flex-wrap gap-2 justify-center">
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '*')">*</div>
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '&')">&amp;</div>
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, '@')">@</div>
                            <div class="code-option code-font text-xl" onclick="selectOption(this, 1, 'ref')">ref</div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="run-puzzle1-btn" class="bg-blue-700 hover:bg-blue-600 text-white px-6 py-2 rounded font-bold opacity-50 cursor-not-allowed transition" onclick="checkPuzzle1()" disabled>
                            <span id="puzzle1-btn-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 3: Mutable Reference Puzzle -->
                <div id="mission-3" class="mission-view hidden flex-grow">
                    <div id="mission3-step" class="text-yellow-400 mb-2 text-sm md:text-base"></div>
                    <p id="mission3-desc" class="text-sm md:text-base text-slate-300 mb-4"></p>
                    <div class="terminal-block text-base md:text-lg mb-4 text-emerald-300">
                        <span class="text-pink-400">let mut</span> s = String::from(<span class="text-yellow-300">"tractor"</span>);<br>
                        <span class="text-pink-400">let</span> r1 = <span id="slot2" class="code-slot" onclick="clearSlot(2)">---</span> s;<br>
                        r1.push_str(<span class="text-yellow-300">" red"</span>);
                    </div>
                    <div id="puzzle2-feedback" class="text-rose-400 h-6 mb-4 text-xs md:text-sm font-bold"></div>
                    <div class="border-t border-blue-900 pt-3">
                        <div class="flex flex-wrap gap-4 justify-center">
                            <div class="code-option code-font" onclick="selectOption(this, 2, '&')">&amp;</div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, 'mut')">mut</div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, '&mut')">&amp;mut</div>
                            <div class="code-option code-font" onclick="selectOption(this, 2, '*mut')">*mut</div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="run-puzzle2-btn" class="bg-yellow-600 hover:bg-yellow-500 text-white px-6 py-2 rounded font-bold opacity-50 cursor-not-allowed transition" onclick="checkPuzzle2()" disabled>
                            <span id="puzzle2-btn-text"></span>
                        </button>
                    </div>
                </div>

                <!-- Mission 4: Borrow Checker Simulator -->
                <div id="mission-4" class="mission-view hidden flex-grow flex flex-col">
                    <div class="text-yellow-400 mb-2 border-b border-blue-800 pb-2 flex justify-between items-center">
                        <span id="mission4-step"></span>
                    </div>
                    <div id="mission4-desc" class="text-sm mb-4 text-slate-300"></div>
                    <div class="bg-blue-950/50 border border-blue-800 rounded p-3 mb-4 text-sm">
                        <div id="task1" class="flex items-center gap-2 text-slate-400">
                            <i class="fa-regular fa-circle"></i>
                            <span id="task1-text"></span>
                        </div>
                        <div id="task2" class="flex items-center gap-2 text-slate-400 mt-2">
                            <i class="fa-regular fa-circle"></i>
                            <span id="task2-text"></span>
                        </div>
                    </div>
                    <div class="terminal-block flex-grow mb-4 min-h-[100px] flex flex-wrap content-start gap-2" id="card-display">
                        <span class="text-slate-500 italic text-sm mt-2 w-full text-center" id="empty-msg">No cards issued yet...</span>
                    </div>
                    <div class="flex flex-wrap gap-2 justify-center mt-auto">
                        <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold code-font shadow-lg border border-blue-400" onclick="issueCard('blue')">
                            + &amp; <span id="blue-card-text"></span>
                        </button>
                        <button class="bg-yellow-600 hover:bg-yellow-500 text-white px-4 py-2 rounded font-bold code-font shadow-lg border border-yellow-300" onclick="issueCard('gold')">
                            + &amp;mut <span id="gold-card-text"></span>
                        </button>
                        <button class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded font-bold ml-auto" onclick="clearCards()">
                            <i class="fa-solid fa-trash"></i> <span id="clear-btn-text"></span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Success Screen -->
        <div id="success-screen" class="hidden absolute inset-0 bg-slate-900/95 backdrop-blur-md rounded-[16px] z-40 flex flex-col items-center justify-center fade-in p-4">
            <div class="text-6xl md:text-7xl mb-4 animate-bounce">🛡️🦀🎉</div>
            <h2 id="success-title" class="text-2xl md:text-4xl font-bold text-white mb-2 text-center px-4"></h2>
            <p id="success-message" class="text-base md:text-xl text-sky-400 mb-6 text-center px-4"></p>
            <div class="flex flex-col sm:flex-row gap-4">
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold text-base md:text-lg shadow-[0_0_15px_rgba(59,130,246,0.6)]" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right ml-2"></i> <span id="restart-btn-text"></span>
                </button>
                <button id="next-chapter-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold text-base md:text-lg" onclick="goToNextChapter()">
                    <i class="fa-solid fa-arrow-right ml-2"></i> <span id="next-chapter-text"></span>
                </button>
            </div>
        </div>
    </div>

        // Helper functions
        function formatNumber(num, lang) {
            const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
            const westernDigits = '0123456789';
            let str = num.toString();
            if (lang !== 'fa') return str.replace(/[۰-۹]/g, d => westernDigits[persianDigits.indexOf(d)]);
            else return str.replace(/[0-9]/g, d => persianDigits[parseInt(d)]);
        }

        // Game state
        let currentLang = 'fa';

        let currentDialogIndex = 0;
        let typeInterval = null;
        let isTyping = false;

        let moved = false;
        let cards = { blue: 0, gold: 0 };
        let task1Done = false, task2Done = false;

        // DOM elements
        const tractorLabelSpan = document.getElementById('tractor-label');
        const guardLabelSpan = document.getElementById('guard-label');
        const tractorOwnerSpan = document.getElementById('tractor-owner');
        const guardStatusSpan = document.getElementById('guard-status');
        const ferrisNameH3 = document.getElementById('ferris-name');
        const nextDialogBtn = document.getElementById('next-dialog-btn');
        const nextBtnSpan = document.getElementById('next-btn-text');
        const nextIcon = document.getElementById('next-icon');
        const dialogTextP = document.getElementById('dialog-text');
        const gameAreaDiv = document.getElementById('game-area');

        // Build language bar dynamically
        function buildLanguageButtons() {
            const bar = document.getElementById('language-bar');
            bar.innerHTML = '';
            for (const [code, data] of Object.entries(languagePack)) {
                const btn = document.createElement('button');
                btn.innerText = data.name;
                btn.className = `px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors ${currentLang === code ? 'bg-blue-600 text-white' : 'text-slate-300 hover:text-white'}`;
                btn.onclick = () => setLang(code);
                bar.appendChild(btn);
            }
        }

        function stopTyping() {
            if (typeInterval) { clearTimeout(typeInterval); typeInterval = null; }
            isTyping = false;
        }

        function startTyping(text, callback) {
            stopTyping();
            dialogTextP.innerHTML = '';
            isTyping = true;
            currentTypingText = text;
            let i = 0;
            function typeNext() {
                if (i < text.length && isTyping) {
                    dialogTextP.innerHTML += text.charAt(i);
                    i++;
                    typeInterval = setTimeout(typeNext, 35);
                } else if (i >= text.length) {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            typeNext();
        }

        function showDialog() {
            const pack = languagePack[currentLang];
            const text = pack.dialogues[currentDialogIndex];
            nextDialogBtn.classList.add('hidden');
            if (currentDialogIndex === 0) {
                document.querySelector('.dashboard').classList.add('shake');
                setTimeout(() => document.querySelector('.dashboard').classList.remove('shake'), 500);
            }
            startTyping(text, () => {
                nextDialogBtn.classList.remove('hidden');
            });
        }

        function nextDialog() {
            if (isTyping) {
                stopTyping();
                dialogTextP.innerHTML = currentTypingText;
                isTyping = false;
                nextDialogBtn.classList.remove('hidden');
                return;
            }
            currentDialogIndex++;
            const pack = languagePack[currentLang];
            if (currentDialogIndex < pack.dialogues.length) {
                showDialog();
            } else {
                currentStep = 1;
                nextDialogBtn.classList.add('hidden');
                dialogTextP.innerHTML = pack.afterDialog;
                gameAreaDiv.classList.remove('hidden');
                startMission(1);
            }
        }

        function updateAllTexts() {
            const pack = languagePack[currentLang];
            if (!pack) return;

            tractorLabelSpan.innerText = pack.tractorLabel;
            guardLabelSpan.innerText = pack.guardLabel;

            document.getElementById('restart-btn-text').innerHTML = pack.restartBtn;
            document.getElementById('next-chapter-text').innerHTML = pack.nextChapterBtn;

            if (currentStep === 0) {
                if (currentDialogIndex < pack.dialogues.length) {
                    const currentDialog = pack.dialogues[currentDialogIndex];
                    if (isTyping) {
                        startTyping(currentDialog, () => nextDialogBtn.classList.remove('hidden'));
                    } else {
                        dialogTextP.innerHTML = currentDialog;
                        nextDialogBtn.classList.remove('hidden');
                    }
                } else {
                    dialogTextP.innerHTML = pack.afterDialog;
                }
            } else {
                dialogTextP.innerHTML = pack.afterDialog;
            }
        }

        function setLang(lang) {
            if (!languagePack[lang]) return;
            currentLang = lang;
            const htmlRoot = document.getElementById('html-root');
            htmlRoot.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
            const btns = document.querySelectorAll('#language-bar button');
            btns.forEach(btn => {
                const btnLang = Object.keys(languagePack).find(k => languagePack[k].name === btn.innerText);
                if (btnLang === lang) {
                    btn.className = "px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors bg-blue-600 text-white";
                } else {
                    btn.className = "px-3 md:px-4 py-1 rounded-full text-xs md:text-sm font-bold transition-colors text-slate-300 hover:text-white";
                }
            });
            updateAllTexts();
        }

        // Mission 1: Move
        function triggerMove() {
            if (moved) return;
            moved = true;
            const pack = languagePack[currentLang];
            tractorOwnerSpan.innerText = currentLang === 'fa' ? "بیل (Bill)" : (currentLang === 'en' ? "Bill" : (currentLang === 'es' ? "Bill" : (currentLang === 'de' ? "Bill" : "Bill")));
            tractorOwnerSpan.parentElement.classList.replace('text-sky-400', 'text-rose-400');
            const feedbackDiv = document.getElementById('move-feedback');
            feedbackDiv.classList.remove('hidden');
            feedbackDiv.innerText = pack.moveFeedback;
            document.getElementById('btn-next-m1').classList.remove('hidden');
        }

        // Puzzle handlers
        function selectOption(element, puzzleNum, word) {
            if ((puzzleNum === 1 && puzzle1Completed) || (puzzleNum === 2 && puzzle2Completed)) return;
            element.parentElement.querySelectorAll('.code-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            const slot = document.getElementById('slot' + puzzleNum);
            const runBtn = document.getElementById('run-puzzle' + puzzleNum + '-btn');
            slot.innerText = word;
            slot.classList.add('filled');
            runBtn.disabled = false;
            runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('puzzle' + puzzleNum + '-feedback').innerText = "";
        }

        function clearSlot(puzzleNum) {
            if ((puzzleNum === 1 && puzzle1Completed) || (puzzleNum === 2 && puzzle2Completed)) return;
            const slot = document.getElementById('slot' + puzzleNum);
            const runBtn = document.getElementById('run-puzzle' + puzzleNum + '-btn');
            slot.innerText = "---";
            slot.classList.remove('filled');
            runBtn.disabled = true;
            runBtn.classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('puzzle' + puzzleNum + '-feedback').innerText = "";
            document.querySelectorAll(`#mission-${puzzleNum+1} .code-option`).forEach(el => el.classList.remove('selected'));
        }

        function checkPuzzle1() {
            if (puzzle1Completed) return;
            const slotText = document.getElementById('slot1').innerText;
            const feedback = document.getElementById('puzzle1-feedback');
            const crt = document.getElementById('crt-monitor');
            if (slotText === '&') {
                feedback.className = "text-emerald-400 h-6 mb-4 font-bold text-sm";
                feedback.innerText = languagePack[currentLang].puzzle1Success;
                puzzle1Completed = true;
                const runBtn = document.getElementById('run-puzzle1-btn');
                runBtn.disabled = true;
                runBtn.classList.add('opacity-50', 'cursor-not-allowed');
                setTimeout(() => startMission(3), 1500);
            } else {
                crt.classList.add('glitch');
                setTimeout(() => crt.classList.remove('glitch'), 300);
                feedback.innerText = languagePack[currentLang].puzzle1Error;
            }
        }

        function checkPuzzle2() {
            if (puzzle2Completed) return;
            const slotText = document.getElementById('slot2').innerText;
            const feedback = document.getElementById('puzzle2-feedback');
            const crt = document.getElementById('crt-monitor');
            if (slotText === '&mut') {
                feedback.className = "text-yellow-400 h-6 mb-4 font-bold text-sm";
                feedback.innerText = languagePack[currentLang].puzzle2Success;
                puzzle2Completed = true;
                const runBtn = document.getElementById('run-puzzle2-btn');
                runBtn.disabled = true;
                runBtn.classList.add('opacity-50', 'cursor-not-allowed');
                setTimeout(() => startMission(4), 1500);
            } else {
                crt.classList.add('glitch');
                setTimeout(() => crt.classList.remove('glitch'), 300);
                feedback.innerText = languagePack[currentLang].puzzle2Error;
            }
        }

        // Borrow Checker Simulator
        function updateGuardHUD(isAngry) {
            const guardContainer = document.getElementById('guard-status-hud');
            if (isAngry) {
                guardStatusSpan.innerHTML = currentLang === 'fa' ? "عصبانی! 🚨" : (currentLang === 'en' ? "Angry! 🚨" : (currentLang === 'es' ? "Enojado! 🚨" : (currentLang === 'de' ? "Wütend! 🚨" : "Boos! 🚨")));
                guardContainer.classList.replace('text-emerald-400', 'text-rose-500');
            } else {
                guardStatusSpan.innerHTML = currentLang === 'fa' ? "آرام 🛡️" : (currentLang === 'en' ? "Relaxed 🛡️" : (currentLang === 'es' ? "Relajado 🛡️" : (currentLang === 'de' ? "Entspannt 🛡️" : "Ontspannen 🛡️")));
                guardContainer.classList.replace('text-rose-500', 'text-emerald-400');
            }
        }

        function triggerError(msgFa, msgEn, msgEs, msgDe, msgNl) {
            const crt = document.getElementById('crt-monitor');
            crt.classList.add('glitch');
            updateGuardHUD(true);
            setTimeout(() => {
                crt.classList.remove('glitch');
                setTimeout(() => updateGuardHUD(false), 1500);
            }, 300);
            let errorMsg = '';
            if (currentLang === 'fa') errorMsg = `🚨 خطای Borrow Checker:\n${msgFa}`;
            else if (currentLang === 'en') errorMsg = `🚨 Borrow Checker Error:\n${msgEn}`;
            else if (currentLang === 'es') errorMsg = `🚨 Error del Borrow Checker:\n${msgEs}`;
            else if (currentLang === 'de') errorMsg = `🚨 Borrow Checker Fehler:\n${msgDe}`;
            else errorMsg = `🚨 Borrow Checker Fout:\n${msgNl}`;
            alert(errorMsg);
        }

        function renderCards() {
            const container = document.getElementById('card-display');
            container.innerHTML = '';
            if (cards.blue === 0 && cards.gold === 0) {
                const emptySpan = document.createElement('span');
                emptySpan.className = "text-slate-500 italic text-sm mt-2 w-full text-center";
                emptySpan.innerText = languagePack[currentLang].emptyMsg;
                container.appendChild(emptySpan);
                return;
            }
            for (let i = 0; i < cards.blue; i++) {
                const el = document.createElement('div');
                el.className = 'borrow-card card-blue';
                el.innerText = '&';
                container.appendChild(el);
            }
            for (let i = 0; i < cards.gold; i++) {
                const el = document.createElement('div');
                el.className = 'borrow-card card-gold';
                el.innerText = '&mut';
                container.appendChild(el);
            }
        }

        function issueCard(type) {
            const pack = languagePack[currentLang];
            if (type === 'blue') {
                if (cards.gold > 0) {
                    triggerError(pack.errorBlueWithGold, pack.errorBlueWithGold, pack.errorBlueWithGold, pack.errorBlueWithGold, pack.errorBlueWithGold);
                    return;
                }
                cards.blue++;
            } else if (type === 'gold') {
                if (cards.blue > 0) {
                    triggerError(pack.errorGoldWithBlue, pack.errorGoldWithBlue, pack.errorGoldWithBlue, pack.errorGoldWithBlue, pack.errorGoldWithBlue);
                    return;
                }
                if (cards.gold > 0) {
                    triggerError(pack.errorGoldDouble, pack.errorGoldDouble, pack.errorGoldDouble, pack.errorGoldDouble, pack.errorGoldDouble);
                    return;
                }
                cards.gold++;
            }
            renderCards();
            checkWinCondition();
        }

        function clearCards() {
            cards.blue = 0;
            cards.gold = 0;
            renderCards();
        }

        function checkWinCondition() {
            if (!task1Done && cards.blue >= 3 && cards.gold === 0) {
                task1Done = true;
                const t1 = document.getElementById('task1');
                t1.classList.replace('text-slate-400', 'text-emerald-400');
                t1.querySelector('i').classList.replace('fa-circle', 'fa-circle-check');
            }
            if (task1Done && !task2Done && cards.gold === 1 && cards.blue === 0) {
                task2Done = true;
                const t2 = document.getElementById('task2');
                t2.classList.replace('text-slate-400', 'text-emerald-400');
                t2.querySelector('i').classList.replace('fa-circle', 'fa-circle-check');
                setTimeout(() => {
                    triggerConfetti();
                    document.getElementById('success-screen').classList.remove('hidden');
                }, 500);
            }
        }

        function goToNextChapter() {
            window.location.href = 'chapter-5.html';
        }

        // --- Confetti System (unchanged) ---
        let W = window.innerWidth, H = window.innerHeight;
        const canvas = document.getElementById('confetti');
        const context = canvas.getContext('2d');
        const maxConfettis = 100;
        const particles = [];
        const possibleColors = ["#3b82f6", "#eab308", "#60a5fa", "#fef08a"];
        function randomFromTo(from, to) { return Math.floor(Math.random() * (to - from + 1) + from); }
        function confettiParticle() {
            this.x = Math.random() * W;
            this.y = Math.random() * H - H;
            this.r = randomFromTo(11, 25);
            this.d = Math.random() * maxConfettis + 11;
            this.color = possibleColors[Math.floor(Math.random() * possibleColors.length)];
            this.tilt = Math.floor(Math.random() * 33) - 11;
            this.tiltAngleIncremental = (Math.random() * 0.07) + 0.05;
            this.tiltAngle = 0;
            this.draw = function() {
                context.beginPath();
                context.lineWidth = this.r / 2;
                context.strokeStyle = this.color;
                context.moveTo(this.x + this.tilt + this.r / 3, this.y);
                context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
                return context.stroke();
            };
        }
        let animationId = null;
        function Draw() {
            animationId = requestAnimationFrame(Draw);
            context.clearRect(0, 0, W, H);
            for (let i = 0; i < maxConfettis; i++) particles[i].draw();
            for (let i = 0; i < maxConfettis; i++) {
                const p = particles[i];
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.tilt = Math.sin(p.tiltAngle - i / 3) * 15;
                if (p.x > W + 30 || p.x < -30 || p.y > H) {
                    p.x = Math.random() * W;
                    p.y = -30;
                    p.tilt = Math.floor(Math.random() * 10) - 20;
                }
            }
        }
        window.addEventListener('resize', () => {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W; canvas.height = H;
        });
        function triggerConfetti() {
            canvas.width = W; canvas.height = H;
            particles.length = 0;
            for (let i = 0; i < maxConfettis; i++) particles.push(new confettiParticle());
            if (!animationId) Draw();
        }

        // Initialization
        buildLanguageButtons();
        setTimeout(() => {
            setLang('fa');
            showDialog();
        }, 500);
    </script>
</body>
</html>
